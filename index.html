<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="advice-container">
        <div class="container" aria-labelledby="advice-id">
            <p class="count">Advice By <span id="times"></span></p>
            <h1 aria-live="polite" class="advice-wise"></h1>
            <img src="icons/pattern-divider-desktop.svg" alt="" class="pattern">
            <button class="roll-dice" aria-label="Generate new advice">
                <img src="icons/icon-dice.svg" alt="" aria-hidden="true">
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
